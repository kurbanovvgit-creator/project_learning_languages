            justify-content: center;

            font-family: Arial, sans-serif;
            transition: background-color 0.3s;
        }
        body.dark {
            background-color: #1a1a1a;
        }
        .container {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 24px;
            max-width: 800px;
            width: 100%;
            position: relative;
            transition: background-color 0.3s, color 0.3s;
        }
        .container.dark {
            background-color: #2d2d2d;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        h1 {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 16px;
        }
        .container.dark h1 {
            color: #e5e7eb;
        }
        p {
            color: #4b5563;
            margin-bottom: 16px;
        }
        .container.dark p {
            color: #d1d5db;
        }
        textarea {
            width: 100%;
            height: 192px;
            padding: 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s, background-color 0.3s, color 0.3s;
            margin-bottom: 16px;
            font-size: 1rem;
            background-color: #fff;
            color: #1f2937;
        }
        .container.dark textarea {
            border-color: #4b5563;
            background-color: #3f3f3f;
            color: #e5e7eb;
        }
        textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }
        button {
            background-color: #3b82f6;
            color: white;
            padding: 8px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        .container.dark button {
            background-color: #2563eb;
        }
        #result {
            margin-top: 24px;
            color: #1f2937;
            font-size: 1rem;
            transition: color 0.3s;
        }
        .container.dark #result {
            color: #e5e7eb;
        }
        #grade {
            margin-top: 16px;
            font-weight: bold;
            font-size: 1.125rem;
            color: #1f2937;
            transition: color 0.3s;
        }
        .container.dark #grade {
            color: #e5e7eb;
        }
        .theme-toggle {
            position: absolute;
            top: 16px;
            right: 16px;
            cursor: pointer;
            width: 24px;
            height: 24px;
            transition: transform 0.3s;
        }
        .theme-toggle:hover {
            transform: scale(1.1);
        }
        .theme-toggle:active {
            transform: scale(0.9);
        }
        .theme-toggle.rotate {
            transform: rotate(90deg);
        }
        .error {
            background-color: rgba(255, 230, 230, 0.5);
            color: red;
            text-decoration: underline red wavy;
            cursor: pointer;
            animation: pulse 0.3s;
        }
        .container.dark .error {
            background-color: rgba(255, 100, 100, 0.3);
        }
        .error:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            background: #333;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 10;
            max-width: 200px;
            white-space: normal;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
    </style>

        // Функция переключения темы
        function toggleTheme() {
            const body = document.body;
            const container = document.querySelector('.container');
            const themeToggle = document.querySelector('.theme-toggle');
            body.classList.toggle('dark');
            container.classList.toggle('dark');
            themeToggle.classList.toggle('rotate');
            // Изменяем цвет иконки замка в зависимости от темы
            themeToggle.setAttribute('stroke', body.classList.contains('dark') ? '#e5e7eb' : '#1f2937');
        }

        // Функция проверки орфографии
        function checkSpelling() {
            const text = document.getElementById('inputText').value;
            const resultDiv = document.getElementById('result');
            const gradeDiv = document.getElementById('grade');

            // Проверка на пустой ввод
            if (!text.trim()) {
                resultDiv.innerHTML = 'Please enter some text.';
                gradeDiv.innerHTML = '';
                return;
            }

            // Разбиваем текст на слова
            const words = text.split(/\s+/);
            let correctedText = text;
            let errorCount = 0;
            const errors = [];

            // Проверяем каждое слово
            let currentIndex = 0;
            const wordRegex = /\b\w+\b/g;
            let match;
            while ((match = wordRegex.exec(text)) !== null) {
                const word = match[0].toLowerCase();
                const start = match.index;
                const end = start + word.length;

                // Если слово отсутствует в словаре, помечаем как ошибку
                if (!dictionary.includes(word)) {
                    errors.push({ word: match[0], start, end });
                }
            }

            // Если есть ошибки, подсвечиваем их
            if (errors.length > 0) {
                // Сортируем ошибки по позиции (от конца к началу, чтобы не сбивать индексы)
                errors.sort((a, b) => b.start - a.start);

                // Подсвечиваем ошибки красным
                for (const error of errors) {
                    correctedText = correctedText.substring(0, error.start) +
                        `<span class="error" data-tooltip="Possible spelling error">${error.word}</span>` +
                        correctedText.substring(error.end);
                    errorCount++;
                }

                // Выводим текст с подсвеченными ошибками
                resultDiv.innerHTML = correctedText;

                // Рассчитываем оценку
                const totalWords = words.length;
                const errorRatio = errorCount / totalWords;
                let grade;

                if (errorRatio === 0) {
                    grade = 5;
                } else if (errorRatio < 0.05) {
                    grade = 4;
                } else if (errorRatio < 0.15) {
                    grade = 3;
                } else {
                    grade = 2;
                }

                gradeDiv.innerHTML = `Grade: ${grade} (Errors found: ${errorCount})`;
            } else {
                resultDiv.innerHTML = 'No errors found!';
                gradeDiv.innerHTML = 'Grade: 5';
            }
        }
